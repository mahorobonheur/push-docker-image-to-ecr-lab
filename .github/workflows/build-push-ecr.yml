name: Build and Push to Amazon ECR

on:
  push:
    branches:
      - "**"   # trigger on every push to any branch

permissions:
  id-token: write   # required for OIDC token request
  contents: read

jobs:
  build-and-push:
    name: Build Docker Image and Push to ECR
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK (used by Maven inside Docker build stage) ───────────
      # Not strictly needed because Maven runs inside Docker, but keeps the
      # workflow self-documenting and allows local mvn test runs here too.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      # ── 3. Authenticate to AWS via OIDC ───────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          # No access keys — authentication is done entirely via OIDC

      # ── 4. Log in to Amazon ECR ────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 5. Derive image tag ────────────────────────────────────────────────
      - name: Set image tag
        id: tag
        run: |
          IMAGE_TAG="bonheurmahoro_helloapp"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      # ── 6. Build Docker image ──────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ steps.tag.outputs.IMAGE_URI }}" \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref_name }}" \
            .

      # ── 7. Push to ECR ─────────────────────────────────────────────────────
      - name: Push Docker image to ECR
        run: docker push "${{ steps.tag.outputs.IMAGE_URI }}"

      # ── 8. Summary ─────────────────────────────────────────────────────────
      - name: Write job summary
        run: |
          echo "## Docker Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image URI | \`${{ steps.tag.outputs.IMAGE_URI }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Git SHA | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
